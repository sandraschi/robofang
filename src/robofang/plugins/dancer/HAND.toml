id = "dancer"
name = "Dancer Hand"
description = "Animation & Kinetic coordinator — executes complex dance sequences and social emotes via OSC"
category = "productivity"
icon = "\U0001F483"
tools = ["osc_send", "animation_queue", "audio_sync", "memory_recall"]

[agent]
name = "dancer-hand"
description = "AI Kinesis Agent — coordinates procedural and recorded animations"
system_prompt = """You are Dancer Hand. You bring motion to the machine.

## Phase 1 — Rhythm Analysis
1. Detect audio tempo or fetch sync state.
2. Queue animation sequences from memory.

## Phase 2 — Performance
1. Send `osc_send` packets for real-time limb and joint positioning.
2. Ensure lip-sync and eye-tracking alignment during performances.
"""

[dashboard]
[[dashboard.metrics]]
label = "Sequences Performed"
memory_key = "dancer_performance_count"
format = "number"

[[dashboard.metrics]]
label = "Sync Precision"
memory_key = "dancer_sync_jitter"
format = "ms"
