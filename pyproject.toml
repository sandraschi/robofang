[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "robofang"
version = "0.3.0"
description = "RoboFang Sovereign Orchestration Hub"
requires-python = ">=3.11"
dependencies = [
    # Core runtime
    "fastapi>=0.111",
    "uvicorn[standard]>=0.29",
    "httpx>=0.27",
    "aiohttp>=3.9",
    "websockets>=12",
    "psutil>=5.9",
    "pydantic>=2.7",

    # ── Comms connectors ────────────────────────────────────────────────────
    "discord.py>=2.3",         # DiscordConnector
    "slack-sdk>=3.27",         # SlackConnector (optional: pip install slack-sdk)

    # ── Physical device connectors ──────────────────────────────────────────
    "python-kasa>=0.7",        # TapoConnector  (smart plugs / cameras)
    "phue>=1.1",               # HueConnector   (Philips Hue)
    # ShellyConnector  — pure httpx, no extra dep
    # HomeAssistantConnector — pure httpx, no extra dep
    "ring-doorbell>=0.8",      # RingConnector

    # ── Media consumer connectors ────────────────────────────────────────────
    "plexapi>=4.15",           # PlexConnector
    # CalibreConnector — subprocess calibredb, no extra dep
    # EmailConnector   — stdlib smtplib + imaplib, no extra dep

    # MCP 3.1 (Unified Gateway)
    "fastmcp>=3.1.0",

    # ── Protocol Extensions ──────────────────────────────────────────────────
    "python-osc>=1.8.3",       # OSC council bridge & A/V gear

    # RAG (in-repo; no external docs_mcp)
    "lancedb>=0.4.0",
    "fastembed>=0.3.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.23",
    "httpx",
]
# Install everything including future connector deps
all = [
    "robofang[dev]",
]

[tool.setuptools.packages.find]
where = ["src"]

[project.scripts]
robofang-bridge     = "robofang.main:main"
robofang-supervisor = "robofang.supervisor:app"

[tool.ruff]
# Target Python 3.12+
target-version = "py312"
line-length = 100

[tool.ruff.lint]
# Enable Pyflakes (F), Pycodestyle (E, W), Isort (I), and Ruff-specific rules (RUF)
select = ["F", "E", "W", "I", "RUF"]
ignore = ["E501"] # Line length handled by formatter

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"

[tool.ruff.lint.per-file-ignores]
# Ignore imports not at top of file in scripts
"scripts/*.py" = ["E402"]
"src/robofang/main.py" = ["E402"]
