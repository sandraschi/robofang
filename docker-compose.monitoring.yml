version: '3.8'

services:
  prometheus:
    build:
      context: .
      dockerfile: containers/Dockerfile.prometheus
    container_name: openfang-prometheus
    volumes:
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    restart: unless-stopped

  loki:
    build:
      context: .
      dockerfile: containers/Dockerfile.loki
    container_name: openfang-loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped

  promtail:
    build:
      context: .
      dockerfile: containers/Dockerfile.promtail
    container_name: openfang-promtail
    volumes:
      - shared_logs:/var/log/fleet_logs
      - d:/Dev/repos/meta_mcp:/var/log/meta_mcp
    command: -config.file=/etc/promtail/promtail-config.yml
    restart: unless-stopped
    depends_on:
      - loki

  grafana:
    build:
      context: .
      dockerfile: containers/Dockerfile.grafana
    container_name: openfang-grafana
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on:
      - prometheus
      - loki

volumes:
  prometheus_data:
  grafana_data:
  shared_logs:
