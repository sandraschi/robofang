server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
- job_name: metanmc
  static_configs:
  - targets:
      - localhost
    labels:
      job: metanmc
      __path__: /var/log/meta_mcp/*.log
- job_name: robofang
  static_configs:
  - targets:
      - localhost
    labels:
      job: robofang
      __path__: /var/log/robofang/*.log
