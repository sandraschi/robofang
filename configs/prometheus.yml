global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'robofang-bridge'
    static_configs:
      - targets: ['host.docker.internal:10871']
    metrics_path: /metrics
    scrape_interval: 15s
  - job_name: 'meta_mcp'
    static_configs:
      - targets: ['host.docker.internal:10711']
  - job_name: 'robofang'
    static_configs:
      - targets: ['host.docker.internal:10701']
