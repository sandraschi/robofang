global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'meta_mcp'
    static_configs:
      - targets: ['host.docker.internal:10711'] # Scrape meta_mcp API for metrics
  - job_name: 'openfang'
    static_configs:
      - targets: ['host.docker.internal:10701'] # Scrape OpenFang API
