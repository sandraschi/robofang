# Robofang Fleet Manifest
# A curated catalog of available "Hands" for selective high-agency orchestration.

hands:
  - id: blender-mcp
    name: Blender Creative Hand
    category: Creative
    potassium_score: 9.2
    description: >
      Empower your agent with professional-grade 3D agency. From geometry generation to
      scene orchestration, this hand allows your AI to "see" and "build" in three dimensions.
    repo_url: https://github.com/sandraschi/blender-mcp
    install_script: start.ps1
    tags: ["3D", "Creative", "Blender"]

  - id: gimp-mcp
    name: GIMP Visual Hand
    category: Creative
    potassium_score: 8.5
