version: '3.8'

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: robofang-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: robofang-grafana
    ports:
      - "3001:3000" # Avoiding 3000 as per user rules
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=robofang_admin
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    container_name: robofang-loki
    ports:
      - "3100:3100"
    restart: unless-stopped

  promtail:
    image: grafana/promtail:latest
    container_name: robofang-promtail
    volumes:
      - /var/log:/var/log
      - ../logs:/logs
      - ./promtail.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    restart: unless-stopped
