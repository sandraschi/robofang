global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'robofang-bridge'
    static_configs:
      - targets: ['host.docker.internal:10871']
    metrics_path: /metrics
  - job_name: 'robofang-core'
    static_configs:
      - targets: ['host.docker.internal:10864']
