# GitHub Release: trigger on tag v* or workflow_dispatch.
# Creates GitHub Release with wheel, sdist, and Windows single .exe; optional PyPI via secrets later.
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. v0.4.0)"
        required: true
        type: string

env:
  PYTHON_VERSION: "3.12"

jobs:
  build-exe:
    name: Build Windows exe
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Extract version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${{ github.ref_name }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_number=${VERSION#v}" >> $GITHUB_OUTPUT

      - name: Sync version to pyproject.toml
        shell: bash
        run: |
          sed -i 's/^version = .*/version = "${{ steps.version.outputs.version_number }}"/' pyproject.toml
          grep '^version = ' pyproject.toml

      - name: Install dependencies and PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller

      - name: Build single exe with PyInstaller
        run: |
          pyinstaller --onefile --name robofang-bridge ^
            --add-data "src/robofang/configs;robofang/configs" ^
            src/robofang/main.py

      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: exe
          path: dist/robofang-bridge.exe

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-exe]
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest pytest-asyncio httpx build
          pip install -e .

      - name: Extract version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${{ github.ref_name }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_number=${VERSION#v}" >> $GITHUB_OUTPUT

      - name: Sync version to pyproject.toml
        run: |
          sed -i 's/^version = .*/version = "${{ steps.version.outputs.version_number }}"/' pyproject.toml
          grep '^version = ' pyproject.toml

      - name: Lint with Ruff
        run: ruff check .

      - name: Format check with Ruff
        run: ruff format --check .

      - name: Test with pytest
        run: pytest

      - name: Build package
        run: python -m build

      - name: Download Windows exe artifact
        uses: actions/download-artifact@v4
        with:
          name: exe

      - name: Generate changelog
        id: changelog
        run: |
          if git describe --tags --abbrev=0 HEAD^ 2>/dev/null; then
            PREV=$(git describe --tags --abbrev=0 HEAD^)
            CHANGELOG=$(git log --pretty=format:"- %s" "$PREV"..HEAD)
          else
            CHANGELOG=$(git log --pretty=format:"- %s" --reverse)
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: RoboFang ${{ steps.version.outputs.version }}
          body: |
            ## RoboFang ${{ steps.version.outputs.version }}

            ${{ steps.changelog.outputs.changelog }}

            ## Installation

            ```bash
            pip install robofang==${{ steps.version.outputs.version_number }}
            ```

            Or install from wheel/sdist attached below. For Windows, use the single **robofang-bridge.exe** for install-free run.
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, 'alpha') || contains(steps.version.outputs.version, 'beta') || contains(steps.version.outputs.version, 'rc') }}
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/robofang-bridge.exe
